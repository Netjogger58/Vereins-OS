name: Deploy Notification

on:
  workflow_run:
    workflows: ["Deploy to Hetzner"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    permissions:
      issues: write
    steps:
      - name: Create Issue on Deploy Failure
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure'
            });
            if (existing.data.length > 0) {
              console.log('Deploy failure issue already open, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${run.head_branch} @ ${run.head_sha.substring(0, 7)}`,
              body: [
                `**Deploy to Hetzner failed**`,
                ``,
                `- **Status:** ${run.conclusion}`,
                `- **Branch:** ${run.head_branch}`,
                `- **Commit:** ${run.head_sha}`,
                `- **Author:** ${run.actor.login}`,
                `- **Run:** ${run.html_url}`,
                ``,
                `Please check the logs and fix the issue.`
              ].join('\n'),
              labels: ['deploy-failure', 'bug']
            });
