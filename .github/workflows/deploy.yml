name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Hetzner
        run: |
          ssh root@${{ secrets.HETZNER_HOST }} "cp -r /root/m75-manager/dist /root/m75-manager/dist-backup-$(date +%Y%m%d-%H%M%S)"
          rsync -avz --delete dist/ root@${{ secrets.HETZNER_HOST }}:/root/m75-manager/dist/
          ssh root@${{ secrets.HETZNER_HOST }} "cd /root/m75-manager && pm2 restart m75-manager && pm2 save"

      - name: Health check on Hetzner
        run: |
          echo "Waiting for app to come up..."
          for i in {1..12}; do
            sleep 5
            STATUS=$(ssh root@${{ secrets.HETZNER_HOST }} "curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000/api/health || echo 000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deploy successful — Hetzner app is healthy"
              exit 0
            fi
          done
          echo "❌ Health check failed after 60s"
          ssh root@${{ secrets.HETZNER_HOST }} "pm2 logs m75-manager --lines 20"
          exit 1
